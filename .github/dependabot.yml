version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-tools:
        patterns:
          - "mypy*"
          - "pytest*"
          - "ruff*"
          - "bandit*"
          - "pip-audit*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
